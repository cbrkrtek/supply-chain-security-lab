apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: supply-chain-security-lab
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cbrkrtek/supply-chain-security-lab.git
    targetRevision: main
    path: k8s-manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: supply-chain-security-lab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
