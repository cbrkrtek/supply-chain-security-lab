name: full-supply-chain-pipeline
on:
  push:
    branches: [ main ]
permissions:
  contents: read
  packages: write
  id-token: write
env:
  IMAGE_TAG: v0.1.0   #add an image tag v.0.1.0
jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint Dockerfile check
        run: docker run --rm -i hadolint/hadolint < Dockerfile

      - name: Build image
        run: docker build -t ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }} .

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6

      - name: Trivy scan (fail on CRITICAL)
        run: trivy image --exit-code 1 --severity CRITICAL ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: docker push ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft (for SBOM)
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (CycloneDX)
        run: syft ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }} -o cyclonedx-json > sbom.json

      - name: Sign image (Keyless)
        run: cosign sign --yes ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }}

      - name: Attach SBOM to OCI image
        run: cosign attach sbom --sbom sbom.json ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }}

      - name: Attest SBOM
        run: cosign attest --yes --predicate sbom.json --type cyclonedx ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }}

      - name: Verify signature (keyless)
        run: |
          cosign verify ghcr.io/${{ github.repository }}:${{ env.IMAGE_TAG }} \
            --certificate-identity-regexp ".*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ env.IMAGE_TAG }}
          path: sbom.json
