name: build-sign
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write   

jobs:
  build-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and Push Docker image
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/supply-chain-demo-app"
          LOW_IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          
          docker build -t "${LOW_IMAGE_NAME}:${{ github.sha }}" .
          docker push "${LOW_IMAGE_NAME}:${{ github.sha }}"
          
          echo "IMAGE_NAME=$LOW_IMAGE_NAME" >> $GITHUB_ENV

      - name: Sign image (Keyless)
        run: 
          cosign sign --yes "${{ env.IMAGE_NAME }}:${{ github.sha }}"
